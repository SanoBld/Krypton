name: krypton
description: "Krypton — high-performance multimedia downloader & converter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  shared_preferences: ^2.3.2
  dynamic_color: ^1.7.0
  http: ^1.2.2
  path_provider: ^2.1.4
  path: ^1.9.0
  open_filex: ^4.6.0
  package_info_plus: ^8.1.1
  file_picker: ^8.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true