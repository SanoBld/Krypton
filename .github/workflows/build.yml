name: Build Krypton

on:
  push:
    branches: [main]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Download yt-dlp (Android ARM64)
        run: |
          mkdir -p assets/binaries
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux_aarch64" \
               -o assets/binaries/yt-dlp

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          for apk in build/app/outputs/flutter-apk/*-release.apk; do
            base=$(basename "$apk" .apk)
            cp "$apk" "dist/krypton-${VERSION}-${base}.apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk
          retention-days: 14

  build-linux:
    name: Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libblkid-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Download yt-dlp (Linux x86_64)
        run: |
          mkdir -p assets/binaries
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux" \
               -o assets/binaries/yt-dlp

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          cd build/linux/x64/release
          tar -czf "../../../../dist/krypton-${VERSION}-linux-x64.tar.gz" bundle/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: dist/*.tar.gz
          retention-days: 14

  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Download yt-dlp (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force assets/binaries | Out-Null
          # Asset name must match pubspec: 'yt-dlp' (no extension)
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile "assets/binaries/yt-dlp"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist\krypton-$version-windows-x64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: dist/*.zip
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: release-assets/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Krypton ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/*